# GitHub Actions Workflow Template for Continuous LLM Evaluation
#
# This workflow runs regression tests on every PR that modifies
# prompt or agent configuration files.
#
# Required secrets:
#   ORQ_API_KEY - orq.ai API key for experiment execution
#
# Required configuration:
#   - Update the paths-filter to match your prompt/agent config file locations
#   - Set EXPERIMENT_ID to your golden dataset experiment
#   - Set BASELINE_FILE to your baseline JSON path

name: LLM Eval Regression

on:
  pull_request:
    paths:
      # Update these paths to match where your prompt/agent configs live
      - "prompts/**"
      - "agents/**"
      - "config/llm/**"
      - "*.prompt.yaml"
      - "*.agent.yaml"

env:
  ORQ_API_KEY: ${{ secrets.ORQ_API_KEY }}
  EXPERIMENT_ID: "YOUR_EXPERIMENT_ID"  # Replace with your experiment ID
  BASELINE_FILE: "eval-baseline.json"

jobs:
  eval-regression:
    name: Run LLM Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate baseline exists
        run: |
          if [ ! -f "$BASELINE_FILE" ]; then
            echo "::warning::No baseline file found at $BASELINE_FILE. Run scripts/update-baseline.sh to create one."
            echo "SKIP_COMPARISON=true" >> $GITHUB_ENV
          fi

      - name: Run evaluation experiment
        id: run-eval
        run: |
          # Create experiment run
          RUN_RESPONSE=$(curl -s -X POST \
            "https://my.orq.ai/v2/experiments/$EXPERIMENT_ID/runs" \
            -H "Authorization: Bearer $ORQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')

          RUN_ID=$(echo "$RUN_RESPONSE" | jq -r '.id')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Started experiment run: $RUN_ID"

          # Poll for completion (max 10 minutes)
          for i in $(seq 1 60); do
            STATUS=$(curl -s \
              "https://my.orq.ai/v2/experiments/$EXPERIMENT_ID/runs/$RUN_ID" \
              -H "Authorization: Bearer $ORQ_API_KEY" | jq -r '.status')

            echo "Status: $STATUS (attempt $i/60)"

            if [ "$STATUS" = "completed" ]; then
              echo "Experiment completed"
              break
            fi

            if [ "$STATUS" = "failed" ]; then
              echo "::error::Experiment run failed"
              exit 1
            fi

            sleep 10
          done

          if [ "$STATUS" != "completed" ]; then
            echo "::error::Experiment timed out"
            exit 1
          fi

      - name: Compare against baseline
        if: env.SKIP_COMPARISON != 'true'
        id: compare
        run: |
          RUN_ID="${{ steps.run-eval.outputs.run_id }}"

          # Fetch results
          RESULTS=$(curl -s \
            "https://my.orq.ai/v2/experiments/$EXPERIMENT_ID/runs/$RUN_ID" \
            -H "Authorization: Bearer $ORQ_API_KEY")

          # Compare against baseline
          # This is a simplified comparison — customize for your evaluators
          BASELINE=$(cat "$BASELINE_FILE")
          VERDICT="PASS"
          REPORT="## LLM Eval Regression Results\n\n"
          REPORT+="| Evaluator | Baseline | Current | Delta | Status |\n"
          REPORT+="|-----------|----------|---------|-------|--------|\n"

          # Parse evaluator scores from results and compare
          # Customize this section based on your experiment output format
          for key in $(echo "$BASELINE" | jq -r '.scores | keys[]'); do
            BASELINE_SCORE=$(echo "$BASELINE" | jq -r ".scores[\"$key\"]")
            THRESHOLD=$(echo "$BASELINE" | jq -r ".thresholds[\"$key\"]")
            # Extract current score from results (customize based on your format)
            CURRENT_SCORE=$(echo "$RESULTS" | jq -r ".scores[\"$key\"] // \"N/A\"")

            if [ "$CURRENT_SCORE" != "N/A" ]; then
              DELTA=$(echo "$CURRENT_SCORE - $BASELINE_SCORE" | bc -l 2>/dev/null || echo "N/A")
              if [ "$(echo "$CURRENT_SCORE < $THRESHOLD" | bc -l 2>/dev/null)" = "1" ]; then
                STATUS="FAIL"
                VERDICT="FAIL"
              else
                STATUS="PASS"
              fi
              REPORT+="| $key | $(printf '%.1f%%' $(echo "$BASELINE_SCORE * 100" | bc -l)) | $(printf '%.1f%%' $(echo "$CURRENT_SCORE * 100" | bc -l)) | $(printf '%+.1f%%' $(echo "$DELTA * 100" | bc -l)) | $STATUS |\n"
            fi
          done

          REPORT+="\n**Verdict: $VERDICT**\n"

          if [ "$VERDICT" = "FAIL" ]; then
            REPORT+="\n> One or more evaluators scored below threshold. Investigate regressions before merging.\n"
          fi

          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo -e "$REPORT" > eval-report.md

      - name: Post results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('eval-report.md', 'utf8');
            } catch {
              body = '## LLM Eval Regression Results\n\nNo baseline found. This run establishes the initial baseline.';
            }

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('LLM Eval Regression Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on regression
        if: steps.compare.outputs.verdict == 'FAIL'
        run: |
          echo "::error::LLM evaluation regression detected. See PR comment for details."
          exit 1
